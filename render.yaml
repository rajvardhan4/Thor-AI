services:
  - type: web
    name: thor-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false # User will input this on Render dashboard
      - key: LLM_PROVIDER
        value: openai-compatible
      - key: LLM_API_KEY
        sync: false # User will input their API Key
      - key: LLM_API_URL
        value: https://api.sambanova.ai/v1
      - key: LLM_MODEL
        value: gpt-oss-120b
